name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: qfzp
          POSTGRES_PASSWORD: qfzp_test
          POSTGRES_DB: qfzp_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate --workspace=apps/api
        env:
          DATABASE_URL: postgresql://qfzp:qfzp_test@localhost:5432/qfzp_test

      - name: Run migrations
        run: npx --prefix apps/api prisma migrate deploy
        env:
          DATABASE_URL: postgresql://qfzp:qfzp_test@localhost:5432/qfzp_test

      - name: Run unit tests
        run: npm run test:unit --workspace=apps/api
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://qfzp:qfzp_test@localhost:5432/qfzp_test
          JWT_SECRET: test-secret-min-32-chars-long-enough

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: apps/api/coverage/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [test-api, lint]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t qfzp-api:${{ github.sha }} .
