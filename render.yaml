services:
  - type: web
    name: qfzp-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free          # Upgrade to Starter ($7/mo) for always-on
    region: frankfurt   # Closest to UAE (eu-central-1 equivalent)
    branch: main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "3001"
      # All secret vars: set in Render dashboard → Environment
      # DATABASE_URL, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY,
      # CLERK_SECRET_KEY, CLERK_WEBHOOK_SECRET, JWT_SECRET,
      # RESEND_API_KEY, STRIPE_SECRET_KEY
